<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <link rel="stylesheet" href="../static/authstyle/acceptcall.css">
    <title>Enigma Desktop App</title>
    <link rel="icon" type="image/x-icon" href="../static/images/my-icon.ico">
</head>
<body>
    <div class="call-container">
        <div class="caller-name">M Amir 05 ❤</div>
        <div class="profile-container">
            <div class="image-wrapper">
                <img src="../static/chatimg/pic1.png" alt="Profile Pic" class="sender-image">
            </div>
        </div>
        <div class="buttons">
            <button class="btn decline">❌</button>
            <button class="btn mute">🔇</button>
            <button class="btn speaker">🔊</button>
            <button class="btn video">🎥</button>
            <span>muted 🔇</span>
           
        </div>
    </div>
    <script src="../static/mainjs/acceptcall.js"></script>
</body>
</html>
