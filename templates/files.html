<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enigma Desktop App</title>
    <link rel="stylesheet" href="../static/authstyle/files.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


</head>

<body>

      <!-- Modal -->
      <div class="modal fade" id="myModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-body">
                    <p class="text">Send To</p>
                    <div class="container mt-5" id="userList">
                        <!-- User list will be dynamically added here -->
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <div class="main-container">

       


        <header class="header">
            <div class="logoo">pictures</div>
        </header>

       

        <div class="file-container">
            <!-- Files will be dynamically loaded here using JavaScript -->
        </div>


        <div class="heading-container">
            <div class="heading-section">
                <h1>Home</h1>
            </div>
            <div class="heading-section">
                <h1>Enigma AI Network</h1>
            </div>
        </div>



        <!-- Link to External JavaScript File -->
        <script src="../static/mainjs/file.js"></script>
</body>

</html>
