    <div class="chat-container">
      <!-- start: Sidebar -->


      <!-- end: Sidebar -->
      <!-- start: Content -->

      <!-- start: Content side -->

      <!-- end: Content side -->
      <!-- start: Conversation -->
      <div class="conversation conversation-default active">
        <div class="conversation-top">
          <!-- Back Button -->
          <button type="button" class="conversation-back">
            <a href="chat">
              <img src="../static/chatimg/Backward arrow sign.png" alt="Back" />
            </a>
          </button>

          <!-- User Details (Name and Status) aligned to the right -->
          <div class="conversation-user">
            <img class="conversation-user-image" id="selectedUserAvatar" src="../static/chatimg/icon.png"
              alt="User Image" />
            <div class="conversation-user-info">
              <div class="conversation-user-name" id="selectedUserName"></div>
              <div class="conversation-user-status" id="user-status-text">
               offline

          <!-- More Info Button -->
          <div class="conversation-buttons">
            <!-- <button

  <script>
    const API_BASE_URL = 'https://enigmakey.tech/serv';
    const currentUser = JSON.parse(localStorage.getItem("currentUser"));
    const selectedUser = JSON.parse(localStorage.getItem("selectedUser"));



    async function getUsersStatus() {
      try {
        const response = await fetch(`${API_BASE_URL}/user_status`);
        const data = await response.json();
        updateUserStatuses(data);
      } catch (error) {
        console.error("🚀 ~ getUsersStatus ~ error:", error);
      }
    }

    const state = {
      userStatuses: {},
      activeUserIds: [],
      previousReceiverId: null
    };

    function updateUserStatuses(statuses) {
      state.userStatuses = statuses;
      checkUserStatus();
      updateStatusUI(); // 👈 Add this line
    }

    function updateStatusUI() {
      const statusElem = document.getElementById('user-status-text');
      const userId = selectedUser?.id; // ✅ Make sure selectedUser is accessible here
      const status = state.userStatuses[userId];

      if (statusElem && status) {
        statusElem.textContent = status === 'online' ? 'Online' : 'Offline';
        statusElem.classList.remove('online', 'offline');
        statusElem.classList.add(status); // Adds 'online' or 'offline' class
      }
    }

    function checkUserStatus() {
      if (!window.agent || !state.userStatuses) return;

      const isReceiverOnline = state.userStatuses[window.agent] === 'online';

      if (isReceiverOnline && !state.activeUserIds.includes(window.agent)) {
        state.activeUserIds.push(window.agent);
      } else {
        state.activeUserIds = state.activeUserIds.filter(id => id !== window.agent);
      }

      if (state.previousReceiverId && state.previousReceiverId !== window.agent) {
        state.activeUserIds = state.activeUserIds.filter(id => id !== state.previousReceiverId);
      }

      state.previousReceiverId = window.agent;

      console.log("Active User IDs:", state.activeUserIds);
    }

    // وقفے وقفے سے اسٹیٹس کو چیک کرنا (اختیاری)
    setInterval(getUsersStatus, 5000);

    console.log("Current User:", currentUser);
    console.log("Selected User:", selectedUser);

    document.getElementById('selectedUserAvatar').src = selectedUser.profileImage ? selectedUser.profileImage : '../static/chatimg/avatar.png';
    document.getElementById('selectedUserName').innerHTML = selectedUser ? selectedUser.firstName + selectedUser.lastName : 'Unkown User';


    const FetchMedia = async () => {
      try {
        if (!currentUser || !selectedUser) {
          console.error("Users not defined!");
          return;
        }

        const response = await fetch(
          `https://enigmakey.tech/serv/get_uris?name1=${currentUser.username}&name2=${selectedUser.username}`
        );

        if (!response.ok) {
          throw new Error(`HTTP error! Status: ${response.status}`);
        }

        const data = await response.json();
        const imagePaths = data?.uris || []; // API se images ka array

        const conversationContainer = document.querySelector(
          ".conversation-images"
        );
        conversationContainer.innerHTML = ""; // Pehle clear karo

            // ✅ No media found condition
    if (imagePaths.length === 0) {
      const noMediaMessage = document.createElement("div");
      noMediaMessage.textContent = "No media found";
      noMediaMessage.style.paddingLeft = "10px"; // Left padding
      noMediaMessage.style.color = "#999"; // Optional styling
      noMediaMessage.style.fontStyle = "italic";
      conversationContainer.appendChild(noMediaMessage);
      return;
    }

        imagePaths.forEach((mediaSrc) => {
          const mediaElement = document.createElement("div");
          mediaElement.classList.add("media-item");

          if (/\.(jpg|jpeg|png|gif)$/i.test(mediaSrc)) {
            const img = document.createElement("img");
            img.src = mediaSrc;
            img.alt = "Image";
            img.className = "chat-media-image";

            const span = document.createElement("span");
            span.textContent = getFileName(mediaSrc);

            mediaElement.appendChild(img);
            mediaElement.appendChild(span);
          } else if (/\.(mp4|webm|ogg)$/i.test(mediaSrc)) {
            const video = document.createElement("video");
            video.src = mediaSrc;
            video.controls = true;
            video.className = "chat-media-video";

            const span = document.createElement("span");
            span.textContent = getFileName(mediaSrc);

            mediaElement.appendChild(video);
            mediaElement.appendChild(span);
          } else if (/\.(mp3|wav)$/i.test(mediaSrc)) {
            mediaElement.innerHTML = `
      <div class="chat-media-card">
        <i class="ri-music-2-fill media-icon"></i>
        <span>${getFileName(mediaSrc)}</span>
        <audio src="${mediaSrc}" controls class="chat-media-audio"></audio>
      </div>
    `;
          } else {
            mediaElement.innerHTML = `
      <div class="chat-media-card">
        <i class="ri-file-2-fill media-icon"></i>
        <span>${getFileName(mediaSrc)}</span>
        <a href="${mediaSrc}" target="_blank">Open File</a>
      </div>
    `;
          }

          conversationContainer.appendChild(mediaElement);
        });


        function getFileName(url) {
          return url.split("/").pop();
        }

        console.log("Fetched Media:", imagePaths);
      } catch (error) {
        console.error("🚀 ~ FetchMedia ~ error:", error);
      }
    };

    FetchMedia();

    // Zoom Disable (Ctrl + Scroll)
    // document.addEventListener("wheel", function(event) {
    //     if (event.ctrlKey) {
    //         event.preventDefault();
    //     }
    // }, { passive: false });

    // // Right-Click Disable
    // document.addEventListener("contextmenu", function(event) {
    //     event.preventDefault();
    // });

    // // Keyboard Shortcuts Disable
    // document.addEventListener("keydown", function(event) {
    //     // Ctrl + Any Key Disable
    //     if (event.ctrlKey || event.metaKey) {
    //         event.preventDefault();
    //     }

    //     // Specific Keys Disable
    //     const disabledKeys = ["F12", "F11", "F10", "F9", "F8", "F7", "F6", "F5", "F4", "F3", "F2", "F1"];
    //     if (disabledKeys.includes(event.key)) {
    //         event.preventDefault();
    //     }
    // });
    document.addEventListener('DOMContentLoaded', function () {
    document.body.style.userSelect = 'none';

    // Also disable mouse-based selection
    document.body.addEventListener('selectstart', function (e) {
        e.preventDefault();
    });
});

  </script>
