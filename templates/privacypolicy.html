<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enigma Desktop App</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../static/authstyle/privacypolicy.css">
</head>
<body>

  <div class="mobile-warning">
    <img src="../static/chatimg/display-not-1.png" alt="Not Supported">
    <p>Unsupported Media</p>
  </div>

  <div class="logo">
    <div class="profile"
  style="position: absolute;
  color: white;
  top: 4%;
  display: flex;
  align-items: center;
  gap: 0px;
  z-index: 1;
  margin-left: 5%;">
     <img src="../static/images/avatar.png" style="width: 54px; height: 54px;" alt="User">
      <div>
        <span style="display: block; margin-bottom: -2px; margin-left: 5px;">Loading...</span>
        <small class="user-email" style="display: block; font-size: 12px; color: gray; margin-left: 5px;">abc@example.com</small>
      </div>
    </div>
  </div>
    
    <h1 class="header">
        <img src="../static/chatimg/Backward arrow sign.png" alt="Back" onclick="goBack()" style="cursor: pointer;">
        Privacy & Policy
    </h1>

    <div class="container">
        <img src="../static/images/Privacy&policy.png" alt="">
    </div>

    
    <script>
        function goBack() {
          window.history.back();
        }
      </script>
      <script src="../static/mainjs/updateprofileApi.js"></script>
      <script>
        document.addEventListener("wheel", function (event) {
    if (event.ctrlKey) {
        event.preventDefault();
    }
}, { passive: false });

// Right-Click Disable
document.addEventListener("contextmenu", function (event) {
    event.preventDefault();
});

// Keyboard Shortcuts Disable
document.addEventListener("keydown", function (event) {
    // Ctrl + Any Key Disable
    if (event.ctrlKey || event.metaKey) {
        event.preventDefault();
    }

    // Specific Keys Disable
    const disabledKeys = ["F12", "F11", "F10", "F9", "F8", "F7", "F6", "F5", "F4", "F3", "F2", "F1"];
    if (disabledKeys.includes(event.key)) {
        event.preventDefault();
    }
});

// // Disable F5, Ctrl+R
document.addEventListener("keydown", function (event) {
    if (event.key === "F5" || (event.ctrlKey && event.key === "r")) {
        event.preventDefault();
    }
});

document.addEventListener('DOMContentLoaded', function () {
    document.body.style.userSelect = 'none';

    // Also disable mouse-based selection
    document.body.addEventListener('selectstart', function (e) {
        e.preventDefault();
    });
});

        </script>
</body>


</html>
