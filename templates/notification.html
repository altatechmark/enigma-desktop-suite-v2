            <button onclick="hideCustomAlert()">OK</button>

        <header class="header">
            <!-- Left Side -->
            <div class="header-left">
                <button type="button" class="conversation-back">
                    <a href="chat">
                        <img src="../static/chatimg/Backward arrow sign.png" alt="Back" />
                    </a>
                </button>
                <div class="profile">
                    <img src="../static/images/avatar.png" alt="User" />
                    <div>
                        <span style="display: block; margin-bottom: -2px; margin-left: 5px; color: white;">Loading...</span>
                        <small class="user-email">abc@example.com</small>
                    </div>
                </div>
            </div>
        
            <!-- Center -->
            <div class="header-center">
                <h2>Notifications</h2>
            </div>
        
            <!-- Right side (empty or optional) -->
            <div class="header-right"></div>
        </header>
        

        
        <div class="popup-container">
            <div class="popup-content">
                <ul>
                    <li><a href="create-group.html">Create Group</a></li>
                    <li>Start a Chat</li>
                    <li>Archive</li>
                </ul>
            </div>
        </div>


        <div class="chat-container">
            <div class="conversation conversation-default active">
                <!-- <div class="conversation-top">

                <div class="content-messages">

                    </ul>
                </div>
            </div>
        </div>

    </section>
